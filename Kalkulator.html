<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.kalkulator{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

/* DISPLAY DIPERJELAS */
#display{
    width:100%;
    height:70px;
    font-size:32px;
    font-weight:bold;
    text-align:right;
    padding:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
}

/* BUTTON */
button{
    width:65px;
    height:65px;
    margin:5px;
    font-size:22px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.angka{
    background:#334155;
    color:white;
}

.operator{
    background:#38bdf8;
    color:white;
}

.hasil{
    background:#22c55e;
    color:white;
    width:140px;
}

.clear{
    background:#ef4444;
    color:white;
}

</style>
</head>

<body>

<div class="kalkulator">

<input type="text" id="display" disabled>

<br>

<button class="angka" onclick="tambahDisplay('7')">7</button>
<button class="angka" onclick="tambahDisplay('8')">8</button>
<button class="angka" onclick="tambahDisplay('9')">9</button>
<button class="operator" onclick="tambahDisplay('/')">÷</button>

<br>

<button class="angka" onclick="tambahDisplay('4')">4</button>
<button class="angka" onclick="tambahDisplay('5')">5</button>
<button class="angka" onclick="tambahDisplay('6')">6</button>
<button class="operator" onclick="tambahDisplay('*')">×</button>

<br>

<button class="angka" onclick="tambahDisplay('1')">1</button>
<button class="angka" onclick="tambahDisplay('2')">2</button>
<button class="angka" onclick="tambahDisplay('3')">3</button>
<button class="operator" onclick="tambahDisplay('-')">-</button>

<br>

<button class="angka" onclick="tambahDisplay('0')">0</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="tambahDisplay('+')">+</button>

<br>

<button class="hasil" onclick="hitung()">=</button>

</div>

<script>

function tambahDisplay(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function hitung(){
    let ekspresi = document.getElementById("display").value;
    document.getElementById("display").value = eval(ekspresi);
}

</script>

</body>
</html>
